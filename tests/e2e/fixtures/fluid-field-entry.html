<!doctype html>
<html lang="en" class="ptal-theme-redwood">
  <head>
    <meta charset="UTF-8" />
    <title>MPU E2E Fluid Field Entry (Modify a Person style)</title>
  </head>
  <body class="ps_fluid">
    <!-- User=BA_TEST; ToolsRel=8.61.15; DBName=CSDEV; AppServ=//appserv:9000 -->
    <div id="PT_HEADER">
      <div class="ps_header-bar">PeopleSoft Fluid Header</div>
      <nav class="ps_breadcrumb" aria-label="breadcrumb">
        <a href="#">Home</a>
        <a href="#">Workforce Administration</a>
        <a href="#">Modify a Person</a>
      </nav>
    </div>
    <main id="pt_main">
      <div class="ps_box-group">
        <div class="ps_box-edit">
          <span class="ps_box-label">Empl ID</span>
          <div class="ps_box-control">
            <input id="PERSONAL_DATA_EMPLID" name="PERSONAL_DATA_EMPLID" value="1000" />
          </div>
        </div>
        <div class="ps_box-edit">
          <span class="ps_box-label">First Name</span>
          <div class="ps_box-control">
            <input id="PERSONAL_DATA_FIRST_NAME" name="PERSONAL_DATA_FIRST_NAME" value="Pat" />
          </div>
        </div>
        <div class="ps_box-edit">
          <span class="ps_box-label">Last Name</span>
          <div class="ps_box-control">
            <input id="PERSONAL_DATA_LAST_NAME" name="PERSONAL_DATA_LAST_NAME" value="Lee" />
          </div>
        </div>
      </div>

      <!-- Modal / popup host (Fluid overlay or lookup). Fields may live in the dialog
           itself and/or a same-origin ptModFrame iframe. -->
      <div id="pt_modals" class="ps_modal" role="dialog" aria-label="Address details">
        <label class="PSEDITBOXLABEL" for="ADDRESSES_ADDRESS1">Address 1</label>
        <input id="ADDRESSES_ADDRESS1" name="ADDRESSES_ADDRESS1" value="" />
        <label class="PSEDITBOXLABEL" for="ADDRESSES_CITY">City</label>
        <input id="ADDRESSES_CITY" name="ADDRESSES_CITY" value="" />
        <iframe
          id="ptModFrame_0"
          name="ptModFrame_0"
          title="Address modal frame"
          srcdoc="<!doctype html><html><body>
            <label for='ADDRESSES_COUNTRY'>Country</label>
            <input id='ADDRESSES_COUNTRY' name='ADDRESSES_COUNTRY' value='' />
          </body></html>"
        ></iframe>
      </div>
    </main>
  </body>
</html>
