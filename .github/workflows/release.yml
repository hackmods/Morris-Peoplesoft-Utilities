name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run generate:icons
      - run: npm run generate:store-assets
      - run: npm run release:check
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            morris-peoplesoft-utilities-v*.zip
            morris-peoplesoft-agents-v*.zip
          body: |
            ## Morris PeopleSoft Utilities

            Chrome extension zip for Chrome Web Store / load-unpacked review builds.
            See `store/SUBMISSION_CHECKLIST.md` and `CHANGELOG.md`.

            ## PeopleSoft agent prompt pack (side toolkit)

            Not part of the extension — portable AI prompts for Cursor, VS Code / Visual Studio + Copilot, and Claude.

            - **Browse on GitHub:** https://github.com/hackmods/Morris-Peoplesoft-Utilities/tree/main/agents
            - **Adoption guide (wiki):** https://github.com/hackmods/Morris-Peoplesoft-Utilities/blob/main/wiki/AI-Agent-Prompts.md
            - **Download:** `morris-peoplesoft-agents-v*.zip` attached to this release (unpack and copy prompts into your IDE)

            Maintained by [hackmods](https://github.com/hackmods).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
