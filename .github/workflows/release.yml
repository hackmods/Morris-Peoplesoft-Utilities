name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run generate:icons
      - run: npm run generate:store-assets
      - run: npm run release:check
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: morris-peoplesoft-utilities-v*.zip
          body: |
            Morris PeopleSoft Utilities release.

            - Chrome Web Store zip attached (upload via Developer Dashboard)
            - See `store/SUBMISSION_CHECKLIST.md`
            - Changelog: CHANGELOG.md

            Maintained by [hackmods](https://github.com/hackmods).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
